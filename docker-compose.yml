services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geosmart-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: geosmart
      POSTGRES_USER: geosmart
      POSTGRES_PASSWORD: geosmart
    ports:
      - "5432:5432"
    volumes:
      - geosmart_pgdata:/var/lib/postgresql/data

volumes:
  geosmart_pgdata:

