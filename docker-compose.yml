version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: geosmart-postgres
    environment:
      POSTGRES_DB: geosmart
      POSTGRES_USER: geosmart
      POSTGRES_PASSWORD: geosmart
    ports:
      - "5432:5432"
    volumes:
      - geosmart_data:/var/lib/postgresql/data
volumes:
  geosmart_data:
